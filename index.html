<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>INAIGEM | Editor de mapa de procesos ODMRS</title>
  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <style>
    :root{
      --inaigem:#0e4e6f;
      --inaigem-2:#147d8f;
      --ink:#111827;
      --muted:#6b7280;
      --bg:#f1f6f9;
      --card:#ffffff;
      --line:#e5e7eb;
      --shadow:0 10px 30px rgba(17,24,39,.12);
      --radius:18px;
      --btn-radius:14px;
      --font:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg);overflow:hidden}
    .topbar{height:72px;background:linear-gradient(135deg,var(--inaigem),var(--inaigem-2));color:#fff;display:flex;align-items:center;padding:0 16px;gap:14px;box-shadow:0 10px 24px rgba(0,0,0,.18)}
    .brand{display:flex;align-items:center;gap:12px;min-width:280px}
    .brand img{width:34px;height:34px;object-fit:contain}
    .brand .t1{font-weight:800;line-height:1.05}.brand .t2{opacity:.9;font-size:12.5px;margin-top:2px}
    .barBtns{display:flex;gap:10px;align-items:center;margin-left:auto;flex-wrap:wrap}
    .btn{border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);color:#fff;padding:10px 14px;border-radius:999px;font-weight:700;cursor:pointer}
    .btn:hover{background:rgba(255,255,255,.16)}
    .app{height:calc(100% - 72px);display:grid;grid-template-columns:320px 1fr 360px;gap:14px;padding:14px;overflow:hidden}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;min-height:0}
    .cardHeader{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:800;background:linear-gradient(#fff,#fbfbfe)}
    .cardBody{padding:14px 16px;overflow:auto;height:100%}
    .toolRow{display:flex;gap:10px}.modeBtn{flex:1;padding:11px 12px;border-radius:14px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:800}
    .modeBtn.on{border-color:rgba(20,125,143,.55);box-shadow:0 0 0 4px rgba(20,125,143,.14)}
    .shapeGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .shapeBtn{border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:800}
    .shapeBtn.on{border-color:rgba(20,125,143,.55);box-shadow:0 0 0 4px rgba(20,125,143,.14)}
    .shapeIcon{width:34px;height:26px;border:2px solid #111827;border-radius:10px;display:inline-block}
    .shapeIcon.start{border-radius:999px}.shapeIcon.decision{transform:rotate(45deg);width:24px;height:24px;border-radius:6px}
    .shapeIcon.doc{position:relative}.shapeIcon.doc:after{content:"";position:absolute;right:4px;top:4px;width:8px;height:8px;border-left:2px solid #111827;border-bottom:2px solid #111827;transform:rotate(45deg)}
    .shapeIcon.image{position:relative}.shapeIcon.image:before{content:"";position:absolute;left:6px;top:6px;width:10px;height:10px;border:2px solid #111827;border-radius:50%}
    .palette{display:flex;gap:8px;flex-wrap:wrap}.swatch{width:26px;height:26px;border-radius:999px;border:2px solid rgba(17,24,39,.22);cursor:pointer}.swatch.on{border-color:var(--inaigem-2);box-shadow:0 0 0 4px rgba(20,125,143,.16)}
    .hint{font-size:12.5px;color:var(--muted);line-height:1.35;background:#fbfbfd;border:1px dashed rgba(17,24,39,.18);padding:10px 12px;border-radius:14px}
    #cy{width:100%;height:100%;background:#fff}.canvasWrap{position:relative;height:100%}
    .dropOverlay{position:absolute;inset:12px;border:2px dashed rgba(17,24,39,.22);border-radius:16px;display:none;align-items:center;justify-content:center;background:rgba(255,255,255,.75);font-weight:900}
    .dropOverlay.on{display:flex}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    label{font-size:12px;color:var(--muted);font-weight:800}
    input,textarea,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:14px;font:inherit}textarea{min-height:110px;resize:vertical}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn2{padding:10px 12px;border-radius:14px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:800}
    .btn2.primary{background:var(--inaigem);color:#fff}.btn2.danger{color:#b91c1c;border-color:rgba(220,38,38,.35)}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 14px;border-radius:999px;display:none;z-index:2000}
    .toast.on{display:block}
    @media (max-width:1180px){.app{grid-template-columns:1fr;grid-template-rows:300px 1fr 380px}}
  </style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <img src="inaigemxd.png" alt="INAIGEM" onerror="this.style.display='none'">
    <div>
      <div class="t1">INAIGEM</div>
      <div class="t2">Editor visual ODMRS (nodos, flechas e imágenes)</div>
    </div>
  </div>
  <div class="barBtns">
    <button class="btn" id="btnFit">Ajustar</button>
    <button class="btn" id="btnZoomIn">Zoom +</button>
    <button class="btn" id="btnZoomOut">Zoom -</button>
    <button class="btn" id="btnExport">Export PNG HD</button>
    <button class="btn" id="btnBackup">Backup JSON</button>
    <button class="btn" id="btnImport">Import JSON</button>
  </div>
</header>
<main class="app">
  <section class="card"><div class="cardHeader">Herramientas</div><div class="cardBody">
    <div class="toolRow"><button class="modeBtn on" id="mSelect">Seleccionar</button><button class="modeBtn" id="mAdd">Agregar</button><button class="modeBtn" id="mLink">Conectar</button></div>
    <hr>
    <div class="shapeGrid">
      <button class="shapeBtn on" data-kind="start"><span class="shapeIcon start"></span>Inicio/Fin</button>
      <button class="shapeBtn" data-kind="process"><span class="shapeIcon"></span>Proceso</button>
      <button class="shapeBtn" data-kind="decision"><span class="shapeIcon decision"></span>Decisión</button>
      <button class="shapeBtn" data-kind="doc"><span class="shapeIcon doc"></span>Documento</button>
      <button class="shapeBtn" data-kind="image"><span class="shapeIcon image"></span>Imagen</button>
    </div>
    <hr><div class="palette" id="palette"></div><hr>
    <div class="hint">Agregar: elija forma y toque el lienzo. Conectar: origen→destino. Editar texto: doble clic. Eliminar: Supr/Delete.</div>
  </div></section>
  <section class="card"><div class="canvasWrap"><div id="cy"></div><div class="dropOverlay" id="dropOverlay">Suelte aquí una imagen</div></div></section>
  <section class="card"><div class="cardHeader">Detalle y edición</div><div class="cardBody">
    <div id="emptySel">Seleccione nodo o flecha para editar.</div>
    <div id="inspector" style="display:none">
      <div class="field"><label>Título</label><input id="fLabel" type="text"></div>
      <div class="row2"><div class="field"><label>Tipo</label><select id="fKind"><option value="start">Inicio/Fin</option><option value="process">Proceso</option><option value="decision">Decisión</option><option value="doc">Documento</option><option value="image">Imagen</option></select></div><div class="field"><label>Color</label><select id="fBg"></select></div></div>
      <div class="field"><label>Descripción</label><textarea id="fDesc"></textarea></div>
      <div id="edgeFields" style="display:none"><div class="field"><label>Etiqueta flecha</label><input id="fEdgeLabel" type="text"></div></div>
      <div class="actions"><button class="btn2 primary" id="btnApply">Aplicar</button><button class="btn2 danger" id="btnDelete">Eliminar</button></div>
    </div>
  </div></section>
</main>
<input type="file" id="filePicker" accept="image/*" style="display:none" />
<div class="toast" id="toast"></div>
<script>
(()=>{const $=id=>document.getElementById(id);const toast=(m,t=1000)=>{const e=$("toast");e.textContent=m;e.classList.add("on");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("on"),t)};const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const COLORS=["#ffffff","#edf6ff","#e9f7ef","#fff4db","#e8f1ff","#dff4f6"];let activeColor=COLORS[0],activeKind="start";const MODE={SELECT:"select",ADD:"add",LINK:"link"};let mode=MODE.SELECT,current=null,linkFrom=null,pendingImageInsertPos=null;
$("fBg").innerHTML=COLORS.map(c=>`<option value="${c}">${c}</option>`).join('');const p=$("palette");COLORS.forEach((c,i)=>{const s=document.createElement('div');s.className='swatch'+(i===0?' on':'');s.style.background=c;s.onclick=()=>{document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on'));s.classList.add('on');activeColor=c};p.appendChild(s)});
const g={nodes:[{data:{id:'n1',kind:'start',label:'INICIO',bg:'#e9f7ef',desc:''},position:{x:160,y:120}}],edges:[]};
const cy=cytoscape({container:$("cy"),elements:g,layout:{name:'preset'},minZoom:.1,maxZoom:3,wheelSensitivity:.2,style:[
{selector:'node',style:{'shape':'round-rectangle','background-color':'data(bg)','border-color':'#0e4e6f','border-width':2,'label':'data(label)','text-wrap':'wrap','text-max-width':150,'font-size':15,'font-weight':800,'color':'#123548','text-valign':'center','text-halign':'center','width':220,'height':80,'corner-radius':14}},
{selector:'node[kind="start"]',style:{'shape':'ellipse','width':220,'height':86}},
{selector:'node[kind="process"]',style:{'shape':'round-rectangle','width':240,'height':84}},
{selector:'node[kind="decision"]',style:{'shape':'diamond','width':180,'height':180,'text-max-width':130}},
{selector:'node[kind="doc"]',style:{'shape':'round-rectangle','width':240,'height':94}},
{selector:'node[kind="image"]',style:{'shape':'round-rectangle','width':'data(w)','height':'data(h)','background-image':'data(img)','background-fit':'contain','background-color':'#fff'}},
{selector:'edge',style:{'curve-style':'bezier','line-color':'#0e4e6f','width':3,'target-arrow-shape':'triangle','target-arrow-color':'#0e4e6f','label':'data(label)','font-size':12,'text-background-color':'#fff','text-background-opacity':.9,'text-background-padding':2}},
{selector:':selected',style:{'border-color':'#147d8f','line-color':'#147d8f','target-arrow-color':'#147d8f','border-width':4}}
]});
const newId=p=>p+'_'+Math.random().toString(16).slice(2,9);const defLabel=k=>k==='start'?'INICIO':k==='decision'?'Decisión':k==='doc'?'Documento':k==='process'?'Actividad':'';
function setMode(m){mode=m;$("mSelect").classList.toggle('on',m===MODE.SELECT);$("mAdd").classList.toggle('on',m===MODE.ADD);$("mLink").classList.toggle('on',m===MODE.LINK);linkFrom=null}
$("mSelect").onclick=()=>setMode(MODE.SELECT);$("mAdd").onclick=()=>setMode(MODE.ADD);$("mLink").onclick=()=>setMode(MODE.LINK);
document.querySelectorAll('.shapeBtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.shapeBtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');activeKind=b.dataset.kind});
function showInspector(ele){current=ele||null;$("emptySel").style.display=current?'none':'block';$("inspector").style.display=current?'block':'none';if(!current)return;if(current.isNode()){ $("edgeFields").style.display='none'; $("fLabel").value=current.data('label')||''; $("fKind").value=current.data('kind')||'process'; $("fBg").value=current.data('bg')||'#fff'; $("fDesc").value=current.data('desc')||'';} else {$("edgeFields").style.display='block'; $("fEdgeLabel").value=current.data('label')||'';}}
$("btnApply").onclick=()=>{if(!current)return;if(current.isNode()){current.data('label',$("fLabel").value||'');current.data('kind',$("fKind").value);current.data('bg',$("fBg").value);current.data('desc',$("fDesc").value||'');}else current.data('label',$("fEdgeLabel").value||'')};
$("btnDelete").onclick=()=>{const s=cy.$(':selected');if(s.length)s.remove();showInspector(null)};
cy.on('tap',evt=>{if(evt.target===cy&&mode===MODE.ADD){const pos=evt.position;if(activeKind==='image'){pendingImageInsertPos=pos;$("filePicker").click();return;}const n=cy.add({group:'nodes',data:{id:newId('n'),kind:activeKind,label:defLabel(activeKind),bg:activeColor,desc:''},position:pos});cy.$(':selected').unselect();n.select();showInspector(n);}else if(evt.target===cy&&mode===MODE.SELECT){showInspector(null)}});
cy.on('tap','node',evt=>{const n=evt.target;if(mode===MODE.LINK){if(!linkFrom){linkFrom=n;toast('Origen seleccionado');return;}if(linkFrom.id()!==n.id())cy.add({group:'edges',data:{id:newId('e'),source:linkFrom.id(),target:n.id(),label:''}});linkFrom=null;return;}showInspector(n)});
cy.on('tap','edge',evt=>showInspector(evt.target));
let lastTap=0,lastTarget=null;cy.on('tap',evt=>{const now=Date.now();const dbl=(lastTarget===evt.target)&&(now-lastTap<320);if(dbl&&evt.target!==cy){if(evt.target.isNode()){const v=prompt('Editar título',evt.target.data('label')||'');if(v!==null)evt.target.data('label',v)}else{const v=prompt('Etiqueta flecha',evt.target.data('label')||'');if(v!==null)evt.target.data('label',v)}}lastTap=now;lastTarget=evt.target});
document.addEventListener('keydown',e=>{const ae=document.activeElement;if(ae&&/^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName))return;if(e.key==='Delete'||e.key==='Backspace'){const s=cy.$(':selected');if(s.length){s.remove();showInspector(null);toast('Eliminado')}}});
$("filePicker").onchange=async e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const p=pendingImageInsertPos||{x:cy.width()/2,y:cy.height()/2};pendingImageInsertPos=null;const n=cy.add({group:'nodes',data:{id:newId('n'),kind:'image',label:'',bg:'#fff',img:r.result,w:280,h:180},position:p});cy.$(':selected').unselect();n.select();showInspector(n)};r.readAsDataURL(f)};
const cyC=cy.container(),ov=$("dropOverlay");['dragenter','dragover'].forEach(ev=>cyC.addEventListener(ev,e=>{e.preventDefault();ov.classList.add('on')}));['dragleave','drop'].forEach(ev=>cyC.addEventListener(ev,e=>{e.preventDefault();ov.classList.remove('on')}));
cyC.addEventListener('drop',e=>{const f=[...(e.dataTransfer?.files||[])].find(x=>x.type.startsWith('image/'));if(!f)return;const rect=cyC.getBoundingClientRect();pendingImageInsertPos={x:(e.clientX-rect.left-cy.pan().x)/cy.zoom(),y:(e.clientY-rect.top-cy.pan().y)/cy.zoom()};$("filePicker").files=e.dataTransfer.files;$("filePicker").dispatchEvent(new Event('change'))});
$("btnFit").onclick=()=>cy.fit(cy.elements(),40);$("btnZoomIn").onclick=()=>cy.zoom({level:clamp(cy.zoom()*1.2,cy.minZoom(),cy.maxZoom()),renderedPosition:{x:cy.width()/2,y:cy.height()/2}});$("btnZoomOut").onclick=()=>cy.zoom({level:clamp(cy.zoom()/1.2,cy.minZoom(),cy.maxZoom()),renderedPosition:{x:cy.width()/2,y:cy.height()/2}});
$("btnExport").onclick=()=>{const png=cy.png({bg:'#fff',full:true,scale:4});const a=document.createElement('a');a.href=png;a.download='inaigem-diagrama-hd.png';a.click();};
$("btnBackup").onclick=()=>{const g={nodes:cy.nodes().map(n=>({data:n.data(),position:n.position()})),edges:cy.edges().map(e=>({data:e.data()}))};const b=new Blob([JSON.stringify(g,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='inaigem_backup.json';a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)};
$("btnImport").onclick=()=>{const i=document.createElement('input');i.type='file';i.accept='application/json';i.onchange=async()=>{const f=i.files&&i.files[0];if(!f)return;const t=await f.text();const g=JSON.parse(t);cy.elements().remove();cy.add(g.nodes||[]);cy.add(g.edges||[]);cy.layout({name:'preset'}).run();};i.click();};
setTimeout(()=>cy.fit(cy.elements(),50),120);
})();
</script>
</body>
</html>
